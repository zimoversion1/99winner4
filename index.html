<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKK99 Winner List</title>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --accent-gold: #FFD700; --border-color: rgba(255, 215, 0, 0.5); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pyidaungsu', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-color: #001432; }
        body::before { 
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('BG.jpg'); background-size: cover; background-position: center; 
            filter: brightness(0.8); z-index: -2; 
        }
        .top-action-bar { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; position: sticky; top: 0; z-index: 100; background: rgba(0, 20, 50, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); border-radius: 0 0 15px 15px; }
        .contact-btn { display: flex; align-items: center; text-decoration: none; background: url('Button/boder.png') no-repeat center; background-size: contain; padding: 5px 15px; }
        .contact-btn img { width: 120px; }
        .logo-img { width: 60px; cursor: pointer; }
        .patouk-img { width: 45px; }
        .container { max-width: 500px; width: 95%; margin: 20px 0; background: rgba(0, 20, 50, 0.85); border-radius: 20px; border: 1px solid var(--border-color); padding: 15px; min-height: 400px; }
        .header-box { text-align: center; margin-bottom: 15px; }
        .tittle-img { width: 100%; max-width: 300px; }
        .table-container { background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; color: white; table-layout: fixed; }
        th { background: rgba(255, 215, 0, 0.2); padding: 12px; color: var(--accent-gold); }
        td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .medal-icon { width: 22px; vertical-align: middle; }
        .amt-text { color: var(--accent-gold); font-weight: bold; }
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .pg-btn { background: var(--accent-gold); color: #000; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .pg-btn:disabled { background: #444; color: #888; }
        #loading { color: gold; text-align: center; padding: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-action-bar">
    <a href="https://gkk99cta.mssg.me/" class="contact-btn" target="_blank"><img src="Button/Text.png"></a>
    <a href="https://www.gkk99.vip/" target="_blank"><img src="99 Logo.png" class="logo-img"></a>
    <img src="Patouk.png" class="patouk-img">
</div>

<div class="container">
    <div class="header-box"><img src="Tittle.png" class="tittle-img"></div>
    <div id="loading">Winner စာရင်းများကို ဖတ်နေပါသည်...</div>
    <div class="table-container" id="tableArea" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">No</th>
                    <th style="width: 45%;">Username</th>
                    <th style="width: 15%;">ဆု</th>
                    <th style="width: 25%;">ပမာဏ</th>
                </tr>
            </thead>
            <tbody id="winnerTable"></tbody>
        </table>
    </div>
    <div class="pagination" id="paginationArea" style="display:none;">
        <button id="prevBtn" class="pg-btn">Back</button>
        <span id="pageInfo" style="color: white; font-size: 12px;"></span>
        <button id="nextBtn" class="pg-btn">Next</button>
    </div>
</div>

<script>
    let finalData = [];
    let currentPage = 1;
    const rowsPerPage = 20;

    function hideName(name) {
        if(!name) return "---";
        let str = name.toString().trim();
        // Username တွေချည်းပဲ ယူမှာမို့လို့ Prize name တွေကို ဖယ်ထားပါမယ်
        const prizeNames = ["one", "two", "three", "four", "five", "six", "seven", "username"];
        if(str === "" || prizeNames.includes(str.toLowerCase())) return "---";
        
        let hidden = "";
        for (let i = 0; i < str.length; i++) {
            hidden += (i % 2 === 1) ? "*" : str[i];
        }
        return hidden;
    }

    function loadCSVData() {
        // ဖိုင်နာမည် အတိအကျ ဖြစ်ရပါမယ်
        Papa.parse("Winner List.csv", {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const rows = results.data;
                // သင့် CSV အရ Column B (index 1) မှာ နာမည်တွေ ရှိပါတယ်
                const memberList = rows.map(r => {
                    let val = (r[1] && r[1].trim() !== "") ? r[1] : null;
                    return val;
                }).filter(v => v !== null);

                setupWinners(memberList);
            },
            error: function() {
                document.getElementById('loading').innerHTML = "ဖိုင်ရှာမတွေ့ပါ။ <br> Winner List.csv ကို index.html နဲ့ တစ်နေရာတည်းမှာ ထားပေးပါ။";
            }
        });
    }

    function setupWinners(list) {
        finalData = [];
        const totalTarget = 543;
        for(let i=0; i < totalTarget; i++) {
            let originalName = list[i] || "Winner-" + (3000 + i); 
            let name = hideName(originalName);
            let medal, amt;

            if(i < 3) { medal="One.png"; amt="5,000,000 Ks"; }
            else if(i < 13) { medal="two.png"; amt="500,000 Ks"; }
            else if(i < 43) { medal="three.png"; amt="250,000 Ks"; }
            else if(i < 143) { medal="Four.png"; amt="100,000 Ks"; }
            else if(i < 243) { medal="Five.png"; amt="50,000 Ks"; }
            else if(i < 393) { medal="six.png"; amt="30,000 Ks"; }
            else { medal="seven.png"; amt="10,000 Ks"; }

            finalData.push({ id: i+1, user: name, img: medal, prize: amt });
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('tableArea').style.display = 'block';
        document.getElementById('paginationArea').style.display = 'flex';
        display();
    }

    function display() {
        const body = document.getElementById('winnerTable');
        body.innerHTML = "";
        let start = (currentPage-1) * rowsPerPage;
        let paged = finalData.slice(start, start + rowsPerPage);
        paged.forEach(item => {
            body.innerHTML += `<tr>
                <td>${item.id}</td>
                <td style="text-align:left; padding-left:15px; font-family:monospace;">${item.user}</td>
                <td><img src="Prize Number/${item.img}" class="medal-icon"></td>
                <td class="amt-text">${item.prize}</td>
            </tr>`;
        });
        document.getElementById('pageInfo').innerText = `စာမျက်နှာ ${currentPage} / ${Math.ceil(finalData.length/rowsPerPage)}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === Math.ceil(finalData.length/rowsPerPage));
    }

    document.getElementById('prevBtn').onclick = () => { currentPage--; display(); window.scrollTo(0,0); };
    document.getElementById('nextBtn').onclick = () => { currentPage++; display(); window.scrollTo(0,0); };

    loadCSVData();
</script>
</body>
</html>
